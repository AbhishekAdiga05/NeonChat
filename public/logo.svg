<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="320"
  height="72"
  viewBox="0 0 320 72"
  fill="none"
>
  <style>
    .ring { fill: url(#ringGradient); }
    .ringStroke { stroke: url(#strokeGradient); }
    .core { fill: url(#coreGradient); }
    .spark { fill: #ffffff; }
    .wordmark { fill: #0080ff; }
    .submark { fill: #0050b3; }

    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #b3ffff; }
      .submark { fill: #80d0ff; }
    }
  </style>

  <defs>
    <linearGradient id="ringGradient" x1="7" y1="6" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00f0ff"/>
      <stop offset="0.45" stop-color="#0080ff"/>
      <stop offset="1" stop-color="#001080"/>
    </linearGradient>
    <linearGradient id="strokeGradient" x1="10" y1="9" x2="54" y2="53" gradientUnits="userSpaceOnUse">
      <stop stop-color="#b3ffff"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="coreGradient" x1="18" y1="18" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0ffff"/>
      <stop offset="1" stop-color="#80ffff"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0
                0 0.35 0 0 0
                0 0 0.6 0 0
                0 0 0 1 0"
      />
    </filter>
    <filter id="hardGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0
                0 0.5 0 0 0
                0 0 0.75 0 0
                0 0 0 1 0"
      />
    </filter>
  </defs>

  <g transform="translate(8 6)">
    <g filter="url(#softGlow)" opacity="0.8">
      <path
        d="M28 1.5C13.364 1.5 1.5 13.364 1.5 28S13.364 54.5 28 54.5 54.5 42.636 54.5 28 42.636 1.5 28 1.5Z"
        fill="url(#ringGradient)"
      />
    </g>
    <path
      class="ring"
      d="M28 3.2c-13.698 0-24.8 11.102-24.8 24.8S14.302 52.8 28 52.8 52.8 41.698 52.8 28 41.698 3.2 28 3.2Zm0 8.2c9.169 0 16.6 7.431 16.6 16.6S37.169 44.6 28 44.6 11.4 37.169 11.4 28 18.831 11.4 28 11.4Z"
    />
    <path
      class="ringStroke"
      d="M28 7.8c11.156 0 20.2 9.044 20.2 20.2S39.156 48.2 28 48.2 7.8 39.156 7.8 28 16.844 7.8 28 7.8Z"
      fill="none"
      stroke-width="1.35"
      opacity="0.7"
    />
    <g filter="url(#hardGlow)">
      <circle class="core" cx="28" cy="28" r="11.6"/>
    </g>
    <path
      class="spark"
      d="M28 18.4l2.18 4.96 5.42.53-4.05 3.62 1.14 5.27L28 30.12l-4.69 2.7 1.14-5.27-4.05-3.62 5.42-.53L28 18.4Z"
    />
    <path
      d="M40.8 15.2l3.3-3.3M12.1 43.9l3.2-3.2M44.1 28h4.7M7.2 28h4.7"
      stroke="#b3ffff"
      stroke-width="1.5"
      stroke-linecap="round"
      opacity="0.75"
    />
  </g>

  <g transform="translate(78 40)">
    <text font-family="ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="36" class="wordmark" letter-spacing="-1.5">NeonChat</text>
  </g>
</svg>
